<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Offline-first Kanban Task Management System" />
    <title>StackTask</title>
    <!-- CSS imports -->
    <link rel="stylesheet" href="/src/css/theme.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <link rel="stylesheet" href="/src/css/style.css" />
    <link rel="stylesheet" href="/src/css/auth.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- AUTHENTICATION SCREEN -->
    <div id="authWrapper" class="auth-wrapper">
      <div class="auth-card">
        <h1 class="auth-logo">StackTask</h1>
        <p class="auth-subtitle">Organize your workflow creatively</p>
        
        <div id="authError" class="auth-error"></div>

        <!-- Login Form -->
        <div id="loginView">
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" required placeholder="user@example.com" />
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn-primary">Log In</button>
          </form>
          <p class="auth-toggle">New to StackTask? <a href="#" id="toggleToSignup">Sign Up</a></p>
        </div>

        <!-- Signup Form -->
        <div id="signupView" style="display: none;">
          <form id="signupForm" class="auth-form">
            <div class="form-group">
              <label for="signupUsername">Username</label>
              <input type="text" id="signupUsername" required placeholder="johndoe" />
            </div>
            <div class="form-group">
              <label for="signupEmail">Email</label>
              <input type="email" id="signupEmail" required placeholder="user@example.com" />
            </div>
            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input type="password" id="signupPassword" required placeholder="••••••••" />
            </div>
            <div class="form-group">
              <label for="signupConfirm">Confirm Password</label>
              <input type="password" id="signupConfirm" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </form>
          <p class="auth-toggle">Already have an account? <a href="#" id="toggleToLogin">Log In</a></p>
        </div>
      </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="mainApp" class="hidden">
      <header class="app-header">
        <h1>StackTask</h1>
        <div class="header-controls">
          <input type="text" id="searchInput" class="search-input" placeholder="Search tasks..." aria-label="Search tasks" />
          <button id="analyticsToggle" class="btn btn-secondary btn-sm" aria-label="Toggle Stats">
            📊 Stats
          </button>
          <button id="themeToggle" class="btn btn-icon" aria-label="Toggle dark mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
          <div class="user-profile">
            <span class="user-name" id="displayUserName">@user</span>
            <button id="logoutBtn" class="btn btn-logout">Logout</button>
          </div>
        </div>
      </header>

      <div class="board-toolbar">
        <button id="undoBtn" class="btn btn-secondary" disabled>Undo</button>
        <button id="redoBtn" class="btn btn-secondary" disabled>Redo</button>
        <button id="addTaskBtn" class="btn btn-primary">+ Add Task</button>
      </div>

      <main class="kanban-board">
        <!-- Columns will be controlled dynamically -->
        <section class="kanban-column" data-status="todo" aria-labelledby="todo-col">
          <header class="column-header">
            <h2 id="todo-col">To Do</h2>
            <span class="task-count" id="count-todo">0</span>
          </header>
          <div class="column-content" id="col-todo"></div>
        </section>

        <section class="kanban-column" data-status="in-progress" aria-labelledby="in-progress-col">
          <header class="column-header">
            <h2 id="in-progress-col">In Progress</h2>
            <span class="task-count" id="count-in-progress">0</span>
          </header>
          <div class="column-content" id="col-in-progress"></div>
        </section>

        <section class="kanban-column" data-status="done" aria-labelledby="done-col">
          <header class="column-header">
            <h2 id="done-col">Done</h2>
            <span class="task-count" id="count-done">0</span>
          </header>
          <div class="column-content" id="col-done"></div>
        </section>
      </main>

      <!-- Analytics Dashboard -->
      <main id="analyticsDashboard" class="hidden analytics-dashboard">
        <div class="analytics-header">
          <h2 class="analytics-title"><span class="kpi-icon">📊</span> Analytics</h2>
          <div class="kpi-cards">
            <div class="kpi-card">
              <span class="kpi-value" id="kpi-total">0</span>
              <span class="kpi-label">TOTAL</span>
            </div>
            <div class="kpi-card">
              <span class="kpi-value" id="kpi-done">0</span>
              <span class="kpi-label">DONE</span>
            </div>
            <div class="kpi-card">
              <span class="kpi-value" id="kpi-completion">0%</span>
              <span class="kpi-label">COMPLETION</span>
            </div>
            <div class="kpi-card">
              <span class="kpi-value" id="kpi-overdue">0</span>
              <span class="kpi-label">OVERDUE</span>
            </div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-container">
            <h3 class="chart-title">TASKS BY STATUS</h3>
            <canvas id="statusChart"></canvas>
          </div>
          <div class="chart-container">
            <h3 class="chart-title">TASKS BY PRIORITY</h3>
            <canvas id="priorityChart"></canvas>
          </div>
          <div class="chart-container wide">
            <h3 class="chart-title">COMPLETION OVER TIME</h3>
            <canvas id="completionOverTimeChart"></canvas>
          </div>
        </div>
      </main>

      <!-- Task Modal Template -->
      <div id="taskModal" class="modal" aria-hidden="true">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="modalTitle">New Task</h2>
            <button class="close-modal btn-icon" aria-label="Close modal">&times;</button>
          </div>
          <form id="taskForm">
            <input type="hidden" id="taskId" />
            
            <div class="form-group">
              <label for="taskTitle">Title</label>
              <input type="text" id="taskTitle" required placeholder="What needs to be done?" autofocus/>
            </div>
            
            <div class="form-group">
              <label for="taskDesc">Description (optional)</label>
              <textarea id="taskDesc" rows="3" placeholder="Add more details..."></textarea>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="taskStatus">Status</label>
                <select id="taskStatus">
                  <option value="todo">To Do</option>
                  <option value="in-progress">In Progress</option>
                  <option value="done">Done</option>
                </select>
              </div>
              <div class="form-group">
                <label for="taskPriority">Priority</label>
                <select id="taskPriority">
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="taskDeadline">Deadline (optional)</label>
              <input type="date" id="taskDeadline" />
            </div>

            <div class="modal-actions">
              <button type="button" class="btn btn-secondary cancel-modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Task</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
